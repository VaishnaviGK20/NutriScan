<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B35">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>{% block title %}NutriScan India{% endblock %}</title>
<style>
/* ===== NutriScan India — Auth Pages ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  background:linear-gradient(135deg,#d94f1e 0%,#FF6B35 40%,#ff9a00 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px 16px;position:relative;overflow-x:hidden;
}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.orb-1{width:320px;height:320px;top:-90px;right:-90px;
        background:rgba(255,255,255,.1);animation:float1 8s ease-in-out infinite}
.orb-2{width:220px;height:220px;bottom:30px;left:-70px;
        background:rgba(255,255,255,.08);animation:float2 10s ease-in-out infinite}
.orb-3{width:100px;height:100px;top:55%;left:10%;
        background:rgba(255,255,255,.06);animation:float1 6s ease-in-out infinite 2s}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(14px)}}

/* ── brand ── */
.brand{text-align:center;color:#fff;margin-bottom:22px;position:relative;z-index:1}
.brand-logo{
  width:64px;height:64px;border-radius:18px;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;color:#fff;
  margin:0 auto 12px;letter-spacing:-1px;
  box-shadow:0 4px 18px rgba(0,0,0,.15);
  animation:pop .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.brand-name{font-size:27px;font-weight:800;margin-top:4px;
            letter-spacing:-.5px;text-shadow:0 2px 6px rgba(0,0,0,.2)}
.brand-tagline{font-size:13px;opacity:.88;margin-top:4px;font-weight:500}

/* ── card ── */
.card{
  background:#fff;border-radius:24px;
  padding:36px 30px 30px;
  width:100%;max-width:420px;
  box-shadow:0 24px 60px rgba(0,0,0,.25),0 4px 16px rgba(0,0,0,.12);
  position:relative;z-index:1;overflow:hidden;
  animation:cardIn .5s cubic-bezier(.34,1.3,.64,1) both .1s;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#FF6B35,#ff9a00);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(40px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.card-title{font-size:22px;font-weight:800;color:#111;margin-bottom:4px}
.card-sub{font-size:14px;color:#6b7280;margin-bottom:22px}

/* ── step dots ── */
.steps{display:flex;gap:8px;justify-content:center;margin-bottom:22px}
.dot{width:8px;height:8px;border-radius:50%;background:#e5e7eb;transition:all .3s}
.dot.active{width:26px;border-radius:4px;background:#FF6B35}
.dot.done{background:#22c55e}

/* ── alert ── */
.alert{
  padding:12px 14px;border-radius:10px;font-size:13px;
  font-weight:500;margin-bottom:16px;
  display:flex;align-items:flex-start;gap:9px;line-height:1.4;
}
.alert-err{background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca}
.alert-ok {background:#f0fdf4;color:#16a34a;border:1.5px solid #bbf7d0}

/* ── form fields ── */
.field{margin-bottom:18px}
.field-label{
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;font-weight:700;color:#4b5563;
  text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;
}
.forgot-link{
  font-size:12px;color:#FF6B35;font-weight:600;
  text-decoration:none;text-transform:none;letter-spacing:0;
}
.forgot-link:hover{text-decoration:underline}

.inp-wrap{position:relative;display:flex;align-items:center}
.inp-icon{
  position:absolute;left:14px;
  pointer-events:none;user-select:none;line-height:1;
  display:flex;align-items:center;color:#9ca3af;
}
.inp-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.field-inp{
  width:100%;height:52px;
  border:2px solid #e5e7eb;border-radius:12px;
  font-size:15px;padding:0 48px 0 44px;
  outline:none;color:#111;
  transition:border-color .2s,box-shadow .2s,background .2s;
  background:#f9fafb;-webkit-appearance:none;
}
.field-inp:focus{
  border-color:#FF6B35;background:#fff;
  box-shadow:0 0 0 4px rgba(255,107,53,.14);
}
.field-inp::placeholder{color:#9ca3af}
.field-inp.err{border-color:#dc2626;background:#fef2f2}
.field-inp.ok{border-color:#22c55e}
.field-inp-noleft{padding-left:16px}

.eye-btn{
  position:absolute;right:12px;
  background:none;border:none;cursor:pointer;
  font-size:12px;font-weight:600;padding:4px 6px;
  color:#9ca3af;letter-spacing:.3px;
  transition:color .2s;
}
.eye-btn:hover{color:#4b5563}

.field-hint{font-size:12px;color:#9ca3af;margin-top:5px}

/* ── password strength ── */
.strength-row{display:flex;gap:4px;margin-top:8px}
.sbar{flex:1;height:4px;border-radius:2px;background:#e5e7eb;transition:background .3s}
.sbar.w{background:#ef4444}
.sbar.m{background:#f59e0b}
.sbar.s{background:#22c55e}
.strength-label{font-size:11px;color:#9ca3af;margin-top:5px;font-weight:600}
.strength-label.w{color:#ef4444}
.strength-label.m{color:#f59e0b}
.strength-label.s{color:#22c55e}

/* ── OTP grid ── */
.otp-grid{display:flex;gap:10px;justify-content:center;margin:18px 0}
.otp-inp{
  width:48px;height:56px;
  border:2.5px solid #e5e7eb;border-radius:12px;
  font-size:24px;font-weight:800;text-align:center;
  outline:none;background:#f9fafb;color:#111;
  transition:all .2s;caret-color:#FF6B35;-webkit-appearance:none;
}
.otp-inp:focus{border-color:#FF6B35;background:#fff;box-shadow:0 0 0 4px rgba(255,107,53,.14)}
.otp-inp.filled{border-color:#FF6B35;background:#fff}

/* ── timer ── */
.timer{text-align:center;font-size:13px;color:#6b7280;margin-bottom:16px}
.timer b{color:#FF6B35}
.timer.expired{color:#dc2626}
.resend-btn{background:none;border:none;color:#FF6B35;font-size:13px;font-weight:700;cursor:pointer;text-decoration:underline;padding:0}

/* ── email info box ── */
.email-box{
  background:#fff7f4;border:1.5px solid rgba(255,107,53,.3);
  border-radius:10px;padding:10px 14px;
  font-size:13px;color:#6b7280;
  margin-bottom:18px;display:flex;align-items:center;gap:8px;
}
.email-box strong{color:#FF6B35;word-break:break-all}

/* ── buttons ── */
.btn-primary{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;height:54px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#FF6B35,#ff9a00);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;
  margin-top:8px;
  box-shadow:0 8px 24px rgba(255,107,53,.38);
  transition:all .2s;letter-spacing:.2px;-webkit-appearance:none;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,107,53,.44)}
.btn-primary:active{transform:scale(.98);opacity:.92}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{
  display:flex;align-items:center;justify-content:center;
  width:100%;height:50px;
  border:2px solid #FF6B35;border-radius:14px;
  background:#fff;color:#FF6B35;
  font-size:15px;font-weight:700;cursor:pointer;
  margin-top:8px;transition:all .2s;-webkit-appearance:none;
}
.btn-secondary:hover{background:#fff7f4}

/* ── card footer ── */
.card-footer{text-align:center;margin-top:22px;font-size:14px;color:#6b7280}
.card-footer a{color:#FF6B35;font-weight:700;text-decoration:none}
.card-footer a:hover{text-decoration:underline}

/* ── divider ── */
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:#9ca3af;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}

/* ── username check badge ── */
.username-badge{position:absolute;right:12px;font-size:14px;font-weight:700;transition:all .3s}

/* ── mobile ── */
@media(max-width:440px){
  .card{padding:28px 18px 24px;border-radius:20px}
  .otp-inp{width:42px;height:50px;font-size:20px}
  .brand-logo{width:54px;height:54px;font-size:18px}
  .brand-name{font-size:23px}
  body{padding:16px 12px}
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="brand">
  <div class="brand-logo">NS</div>
  <div class="brand-name">NutriScan India</div>
  <div class="brand-tagline">Scan food &middot; Know what you eat &middot; Stay healthy</div>
</div>

<div class="card">
  {% block card %}{% endblock %}
</div>

<script>
function togglePwd(id) {
  const inp = document.getElementById(id);
  const btn = inp && inp.parentElement.querySelector('.eye-btn');
  if (!inp) return;
  if (inp.type === 'password') { inp.type = 'text';     if (btn) btn.textContent = 'Hide'; }
  else                         { inp.type = 'password'; if (btn) btn.textContent = 'Show'; }
}

function checkStrength(val) {
  const bars  = document.querySelectorAll('.sbar');
  const label = document.getElementById('strengthLabel');
  if (!bars.length) return;
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  bars.forEach(b => b.className = 'sbar');
  const cls = score <= 1 ? 'w' : score <= 2 ? 'm' : 's';
  const labels = { w:'Weak', m:'Medium', s:'Strong' };
  for (let i = 0; i < Math.ceil(score * bars.length / 4); i++) bars[i].classList.add(cls);
  if (label) { label.textContent = labels[cls] || ''; label.className = 'strength-label ' + cls; }
}

function validateUsername(val) {
  const badge = document.getElementById('unameBadge');
  const inp   = document.getElementById('usernameInp');
  if (!badge || !inp) return;
  const ok = /^[a-zA-Z0-9_]{3,20}$/.test(val);
  badge.textContent = val.length >= 3 ? (ok ? 'OK' : 'Invalid') : '';
  badge.style.color = ok ? '#22c55e' : '#ef4444';
  inp.className = 'field-inp' + (val.length >= 3 ? (ok ? ' ok' : ' err') : '');
}

function initOtp() {
  const boxes = document.querySelectorAll('.otp-inp');
  if (!boxes.length) return;
  boxes.forEach((b, i) => {
    b.addEventListener('input', e => {
      const v = e.target.value.replace(/\D/g,'');
      e.target.value = v.slice(-1);
      if (v && i < boxes.length - 1) boxes[i + 1].focus();
      e.target.classList.toggle('filled', !!v);
      collectOtp(boxes);
    });
    b.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !b.value && i > 0) {
        boxes[i - 1].value = ''; boxes[i - 1].classList.remove('filled'); boxes[i - 1].focus();
      }
    });
    b.addEventListener('paste', e => {
      e.preventDefault();
      const txt = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      txt.split('').forEach((c, idx) => { if (boxes[idx]) { boxes[idx].value = c; boxes[idx].classList.add('filled'); } });
      const next = Array.from(boxes).findIndex(b => !b.value);
      (next !== -1 ? boxes[next] : boxes[boxes.length - 1]).focus();
      collectOtp(boxes);
    });
  });
  boxes[0] && boxes[0].focus();
}

function collectOtp(boxes) {
  const code = Array.from(boxes).map(b => b.value).join('');
  const h = document.getElementById('otp-hidden');
  if (h) h.value = code;
  if (code.length === 6) {
    const form = boxes[0].closest('form');
    if (form) setTimeout(() => form.submit(), 120);
  }
}

function startTimer(seconds, resendUrl) {
  const el = document.getElementById('timerText');
  if (!el) return;
  let t = seconds;
  const iv = setInterval(() => {
    t--;
    if (t <= 0) {
      clearInterval(iv);
      el.innerHTML = 'Code expired. <button class="resend-btn" onclick="location.href=\'' + resendUrl + '\'">Resend</button>';
      el.classList.add('expired');
    } else {
      const m = String(Math.floor(t / 60)).padStart(2, '0');
      const s = String(t % 60).padStart(2, '0');
      el.innerHTML = 'Code expires in <b>' + m + ':' + s + '</b>';
    }
  }, 1000);
}

document.addEventListener('DOMContentLoaded', () => {
  initOtp();
  const timer = document.getElementById('timerText');
  if (timer && timer.dataset.seconds) startTimer(parseInt(timer.dataset.seconds), timer.dataset.resend || '/');
});
</script>

{% block scripts %}{% endblock %}
</body>
</html>
